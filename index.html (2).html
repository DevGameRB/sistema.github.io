<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Policial WSP ELITE FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<style>
body{font-family:'Segoe UI';background:linear-gradient(135deg,#0b1e2d,#020c14);color:white;margin:0}
header{background:#000;padding:15px;text-align:center;font-size:22px;border-bottom:2px solid #1e88e5}
.container{width:95%;margin:auto}
.grid{display:grid;grid-template-columns:1fr 2fr;gap:15px;margin-top:10px}
.card{background:#0e2435;padding:15px;border-radius:10px;box-shadow:0 0 15px #000}
input,select,textarea{width:100%;margin:5px 0;padding:8px;border-radius:5px;border:none;background:#081521;color:white}
button{padding:8px;background:#1e88e5;color:white;border:none;border-radius:5px;cursor:pointer}
button:hover{background:#1565c0}
ul{list-style:none;padding:0}
li{background:#020c14;margin:5px 0;padding:10px;border-radius:5px;border-left:4px solid #1e88e5}
.hidden{display:none}
.stats{display:flex;gap:10px}
.stat{background:#081521;padding:10px;border-radius:8px;text-align:center;flex:1}
</style>
</head>
<body>

<header>🚓 SISTEMA POLICIAL WSP ELITE FINAL</header>

<div id="loginPanel" class="card" style="max-width:300px;margin:80px auto">
<h3>🔐 Acceso</h3>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="loginUser()">Ingresar</button>
<button onclick="registerUser()">Registrar</button>
</div>

<div id="app" class="container hidden">
<button onclick="logoutUser()">Cerrar sesión</button>

<div class="stats">
<div class="stat">Reportes<br><span id="total">0</span></div>
<div class="stat">Crimen<br><span id="crimen">0</span></div>
<div class="stat">Accidente<br><span id="accidente">0</span></div>
<div class="stat">Robo<br><span id="robo">0</span></div>
</div>

<div class="grid">

<div class="card">
<h3>👮 Oficiales</h3>
<input id="nombreOficial" placeholder="Nombre">
<select id="rango">
<option>Agente</option>
<option>Sargento</option>
<option>Capitán</option>
</select>
<button onclick="agregarOficial()">Agregar</button>
<ul id="listaOficiales"></ul>
</div>

<div class="card">
<h3>📄 Reporte</h3>
<select id="tipo">
<option>Crimen</option>
<option>Accidente</option>
<option>Robo</option>
</select>
<select id="oficial"></select>
<input id="ubicacion" placeholder="Ubicación">
<input type="file" id="foto">
<textarea id="descripcion" placeholder="Descripción"></textarea>
<button onclick="crearReporte()">Guardar</button>
<button onclick="window.print()">🖨️ Imprimir</button>

<h3>🔎 Buscar</h3>
<input id="busqueda" placeholder="Buscar..." oninput="filtrar()">

<h3>📋 Reportes</h3>
<ul id="listaReportes"></ul>
</div>

</div>
</div>

<script>
const firebaseConfig={apiKey:"TU_API_KEY",authDomain:"TU_PROYECTO.firebaseapp.com",projectId:"TU_PROYECTO",storageBucket:"TU_PROYECTO.appspot.com",appId:"TU_APP_ID"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

function registerUser(){auth.createUserWithEmailAndPassword(email.value,password.value).catch(e=>alert(e.message));}
function loginUser(){
  const user = email.value;
  const pass = password.value;

  // 🔐 ACCESO ADMIN LOCAL
  if(user === 'admin' && pass === '1234'){
    alert('Acceso como ADMIN');
    loginPanel.classList.add('hidden');
    app.classList.remove('hidden');
    return;
  }

  // 🔥 LOGIN FIREBASE NORMAL
  auth.signInWithEmailAndPassword(user, pass)
    .catch(e => alert(e.message));
}
function logoutUser(){auth.signOut();}

auth.onAuthStateChanged(u=>{loginPanel.classList.toggle('hidden',!!u);app.classList.toggle('hidden',!u);});

function agregarOficial(){if(!nombreOficial.value)return;db.collection('oficiales').add({nombre:nombreOficial.value,rango:rango.value});}

db.collection('oficiales').onSnapshot(s=>{
listaOficiales.innerHTML='';oficial.innerHTML='<option>Seleccionar</option>';
s.forEach(d=>{let o=d.data();listaOficiales.innerHTML+=`<li>${o.rango} ${o.nombre}</li>`;oficial.innerHTML+=`<option>${o.nombre}</option>`;});
});

async function crearReporte(){
let file=foto.files[0];let url='';
if(file){let ref=storage.ref('evidencias/'+Date.now());await ref.put(file);url=await ref.getDownloadURL();}
let numeroCaso='WSP-'+new Date().getFullYear()+'-'+Date.now();
await db.collection('reportes').add({numeroCaso,tipo:tipo.value,oficial:oficial.value,ubicacion:ubicacion.value,descripcion:descripcion.value,foto:url,fecha:new Date()});
}

let cache=[];

db.collection('reportes').orderBy('fecha','desc').onSnapshot(s=>{
cache=[];listaReportes.innerHTML='';
s.forEach(d=>{let r=d.data();cache.push(r);render(r);});
actualizarStats();
});

function render(r){
listaReportes.innerHTML+=`<li><strong>${r.numeroCaso}</strong><br>${r.tipo} - ${r.oficial}<br>📍 ${r.ubicacion}<br>${r.descripcion}<br>${r.foto?`<img src="${r.foto}" width="100">`:''}</li>`;
}

function actualizarStats(){
total.textContent=cache.length;
crimen.textContent=cache.filter(r=>r.tipo==='Crimen').length;
accidente.textContent=cache.filter(r=>r.tipo==='Accidente').length;
robo.textContent=cache.filter(r=>r.tipo==='Robo').length;
}

function filtrar(){
let t=busqueda.value.toLowerCase();listaReportes.innerHTML='';
cache.filter(r=>JSON.stringify(r).toLowerCase().includes(t)).forEach(render);
}
</script>

</body>
</html>
